<!DOCTYPE html>
<html lang="zh-cn">
{{ partial "head.html" . }}

<body>
  <article class="posts">
    <div class="row">
      <div class="col-xs-12">
        {{ partial "header.html" . }}

        <h1 class="taxonomy-term">{{ .Title }}</h1>
        
        <div class="links-content">
          {{ .Content }}
        </div>

        <div class="links-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px;">
          {{ range .Site.Data.links.links }}
          <div class="link-card" style="border: 1px solid #eee; border-radius: 8px; padding: 20px; background-color: #fff; transition: box-shadow 0.3s;">
            <div style="display: flex; align-items: center; gap: 15px;">
              {{ if .avatar }}
              <img src="{{ .avatar }}" alt="{{ .name }}" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
              {{ else }}
              <div style="width: 60px; height: 60px; border-radius: 50%; background-color: #eee; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                {{ substr .name 0 1 }}
              </div>
              {{ end }}
              <div>
                <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" style="font-size: 18px; font-weight: bold; text-decoration: none; color: #333;">{{ .name }}</a>
                <p style="margin: 5px 0 0 0; font-size: 14px; color: #666;">{{ .description }}</p>
              </div>
            </div>
          </div>
          {{ end }}
        </div>

        {{ partial "footer.html" . }}
      </div>
    </div>
  </article>

  {{ partial "scripts.html" . }}
</body>

</html>
