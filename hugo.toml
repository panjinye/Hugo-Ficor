baseURL = 'https://lawpan.cc/'
languageCode = 'zh-cn'
title = 'Lawpan'
copyright = 'Lawpan'
theme = 'yinyang'
hasCJKLanguage = true
enableEmoji = true


[pagination]
  pagerSize = 5

[params]
  mainSections = ["posts"]
  [params.author]
    name = "Lawpan"
  logoImg = false
  logoInvert = false
  math = true

[params.comments]
  enabled = false

[params.meta]
  description = '探索技术与生活的交汇点'

[[params.socials]]
    name = "GitHub"
    link = "https://github.com/ficorcc"
[[params.socials]]
    name = "Twitter"
    link = "https://twitter.com/ficorpan"
[[params.socials]]
    name = "Email"
    link = "mailto:ficor@ficor.cc"
[[params.socials]]
    name = "Mastodon"
    link = "https://mastodon.social/@ficor"

[[menus.main]]
  identifier = 'home'
  name = '首页'
  url = '/'
  weight = 1

[[menus.main]]
  identifier = 'archives'
  name = '归档'
  url = '/posts'
  weight = 2

[[menus.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 3

[[menus.main]]
  identifier = 'links'
  name = '友链'
  url = '/links/'
  weight = 4

[module]
  [module.hugoVersion]
    extended = true
    min = "0.116.0"

[markup]
  [markup.highlight]
    style = "monokai"
    tabWidth = 4
    codeFences = true
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
